<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সহরথ - সদস্য তালিকা</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            text-align: center;
            padding: 40px 0;
            background: linear-gradient(135deg, #2c3e50, #27ae60);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 320px)); 
            gap: 25px;
            justify-content: center;
        }
        .member-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            text-align: center;
            padding-bottom: 20px;
        }
        .member-card:hover {
            transform: translateY(-10px);
        }

        .member-img {
            width: 100%;
            aspect-ratio: 413 / 531;
            object-fit: cover;
            object-position: center;
            border-bottom: 4px solid var(--accent-color);
            display: block;
        }

        .member-info h3 {
            margin: 15px 0 5px;
            color: var(--primary-color);
            font-size: 1.1rem;
        }
        .member-info p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #666;
        }
        .highlight {
            color: #ffcc00;
            font-weight: bold;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <h1><span class="highlight">সহরথ</span></h1>
    <p>Helping hand for needy</p>
</header>

<div class="container">
    <div class="member-card">
       <img src="emon officila pic.jpg" alt="সদস্যের ছবি" class="member-img">
        <div class="member-info">
            <h3>MD AHSAN KADIR EMON</h3>
            <p>📧 ahsanemon1710@gmail.com</p>
            <p>📞 01308105083</p>
        </div>
    </div>

    <div class="member-card">
        <img src="sakibbhai.png" alt="সদস্যের ছবি" class="member-img">
        <div class="member-info">
            <h3>MD. SAKIBUL HASAN SAKIB </h3>
            <p>📧 sakibsh883@gmail.com</p>
            <p>📞 01738094534</p>
        </div>
    </div>
</div>

<footer>
    <p>&copy; ২০২৬ সহরথ | সকল অধিকার সংরক্ষিত</p>
</footer>

</body>
</html>
